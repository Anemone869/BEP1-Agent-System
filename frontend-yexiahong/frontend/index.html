<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能聊天助手 - 带历史记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========= 左侧边栏 ========= */
        .sidebar {
            width: 260px;
            background-color: #f9f9f9;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .new-chat-btn {
            width: 100%;
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 10px 0;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .new-chat-btn:hover {
            background-color: #06ad56;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .history-item {
            padding: 12px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: transparent;
        }

        .history-item:hover {
            background-color: #eaeaea;
        }

        .history-item.active {
            background-color: #e0f2e5;
            font-weight: 500;
        }

        .history-title {
            font-size: 14px;
            color: #222;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex: 1;
        }

        .delete-history {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            opacity: 0;
            transition: opacity 0.1s;
            padding: 0 6px;
        }

        .history-item:hover .delete-history {
            opacity: 1;
        }

        .delete-history:hover {
            color: #ff4d4f;
        }

        /* ========= 右侧聊天区 ========= */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ededed;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            background-color: #ededed;
            padding: 16px 12px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        .chat-container::-webkit-scrollbar,
        .history-list::-webkit-scrollbar {
            width: 5px;
        }

        .chat-container::-webkit-scrollbar-track,
        .history-list::-webkit-scrollbar-track {
            background: #d9d9d9;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb,
        .history-list::-webkit-scrollbar-thumb {
            background: #b3b3b3;
            border-radius: 3px;
        }

        /* 消息气泡样式 – 沿用原风格 */
        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeInUp 0.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-left {
            justify-content: flex-start;
        }

        .message-right {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            word-wrap: break-word;
            font-size: 15px;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.05);
        }

        .message-left .message-bubble {
            background-color: #ffffff;
            color: #111;
            border-top-left-radius: 4px;
        }

        .message-right .message-bubble {
            background-color: #95ec69;
            color: #111;
            border-top-right-radius: 4px;
        }

        /* 底部输入区 */
        .input-area {
            display: flex;
            padding: 10px 12px;
            background-color: #fafafa;
            border-top: 0.5px solid #e0e0e0;
            align-items: center;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 22px;
            outline: none;
            font-size: 16px;
            background-color: #ffffff;
            box-shadow: 0 0 0 0.5px #e0e0e0;
            transition: all 0.2s;
        }

        #message-input:focus {
            box-shadow: 0 0 0 1px #07c160;
        }

        #send-btn {
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.05s;
        }

        #send-btn:disabled {
            background-color: #a5d6b0;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .sidebar {
                width: 200px;
            }
        }
    </style>
</head>

<body>
    <!-- 左侧边栏：历史对话列表 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="history-list" id="historyList">
            <!-- 动态生成历史会话列表 -->
        </div>
    </div>

    <!-- 右侧聊天主区 -->
    <div class="chat-main">
        <div class="chat-container" id="chat-box">
            <!-- 欢迎消息会由JS动态渲染，避免硬编码 -->
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="输入消息，AI会回答你..." autocomplete="off">
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        // ========================
        // 带历史记录的智能聊天助手
        // 数据存储: localStorage
        // 会话结构: { id, title, messages: [{role, content}] }
        // role: 'user' 或 'assistant'
        // ========================

        // DOM 元素
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const historyListDiv = document.getElementById('historyList');
        const newChatBtn = document.getElementById('newChatBtn');

        // 会话存储 key
        const STORAGE_KEY = 'chat_conversations';
        let conversations = [];     // 所有会话数组
        let currentConvId = null;   // 当前激活的会话ID
        let isRequesting = false;    // 防止重复发送

        // ---------- 辅助函数 ----------
        // 保存所有会话到 localStorage
        function saveConversations() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
        }

        // 生成简短ID
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
        }

        // 根据消息数组生成标题（取第一条用户消息的前20字）
        function generateTitle(messages) {
            const firstUserMsg = messages.find(m => m.role === 'user');
            if (firstUserMsg && firstUserMsg.content) {
                let title = firstUserMsg.content.slice(0, 20);
                if (firstUserMsg.content.length > 20) title += '...';
                return title;
            }
            return '新对话';
        }

        // 渲染右侧聊天区（根据当前会话的消息）
        function renderCurrentChat() {
            const conversation = conversations.find(c => c.id === currentConvId);
            if (!conversation) {
                chatBox.innerHTML = '<div class="message message-left"><div class="message-bubble">请选择一个对话或新建对话</div></div>';
                return;
            }
            chatBox.innerHTML = '';
            conversation.messages.forEach(msg => {
                const isUser = (msg.role === 'user');
                addMessageToDOM(msg.content, isUser, false); // 不自动保存
            });
            // 滚动到底部
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 仅将消息添加到DOM（不保存，用于渲染已有消息）
        function addMessageToDOM(content, isUser = false, needSave = false) {
            if (!content || content.trim() === '') return;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'message-right' : 'message-left'}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content.trim();
            messageDiv.appendChild(bubble);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // 如果需要保存到当前会话（发送消息时的调用）
            if (needSave && currentConvId) {
                const convIndex = conversations.findIndex(c => c.id === currentConvId);
                if (convIndex !== -1) {
                    conversations[convIndex].messages.push({
                        role: isUser ? 'user' : 'assistant',
                        content: content.trim()
                    });
                    // 更新标题（第一条用户消息后）
                    if (isUser && conversations[convIndex].messages.length === 1) {
                        conversations[convIndex].title = generateTitle(conversations[convIndex].messages);
                    }
                    saveConversations();
                    renderHistoryList();   // 刷新侧边栏（标题可能变化）
                }
            }
        }

        // 添加新消息（对外接口，同时存DOM和存储）
        function addMessage(content, isUser = false, save = true) {
            addMessageToDOM(content, isUser, save);
        }

        // 渲染左侧历史列表
        function renderHistoryList() {
            if (!historyListDiv) return;
            historyListDiv.innerHTML = '';
            if (conversations.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.padding = '16px';
                emptyDiv.style.color = '#999';
                emptyDiv.style.textAlign = 'center';
                emptyDiv.innerText = '暂无对话，点击新建';
                historyListDiv.appendChild(emptyDiv);
                return;
            }
            conversations.forEach(conv => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `history-item ${currentConvId === conv.id ? 'active' : ''}`;
                const titleSpan = document.createElement('span');
                titleSpan.className = 'history-title';
                titleSpan.innerText = conv.title || '对话';
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-history';
                delBtn.innerText = '🗑️';
                delBtn.title = '删除此对话';
                // 阻止事件冒泡，避免触发切换会话
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(conv.id);
                });
                itemDiv.appendChild(titleSpan);
                itemDiv.appendChild(delBtn);
                itemDiv.addEventListener('click', () => {
                    if (currentConvId === conv.id) return;
                    currentConvId = conv.id;
                    renderCurrentChat();
                    renderHistoryList();
                });
                historyListDiv.appendChild(itemDiv);
            });
        }

        // 删除某个会话
        function deleteConversation(convId) {
            const index = conversations.findIndex(c => c.id === convId);
            if (index !== -1) {
                conversations.splice(index, 1);
                saveConversations();
                if (currentConvId === convId) {
                    // 如果删除的是当前会话，则切换到另一个会话（若有）或清空
                    if (conversations.length > 0) {
                        currentConvId = conversations[0].id;
                    } else {
                        currentConvId = null;
                        chatBox.innerHTML = '<div class="message message-left"><div class="message-bubble">暂无对话，点击「新建对话」开始聊天吧</div></div>';
                    }
                }
                renderHistoryList();
                if (currentConvId) {
                    renderCurrentChat();
                } else {
                    // 没有会话时，清空聊天区为提示
                    chatBox.innerHTML = '<div class="message message-left"><div class="message-bubble">点击「新建对话」开始聊天~</div></div>';
                }
            }
        }

        // 新建对话
        function createNewConversation() {
            const newId = generateId();
            const newConv = {
                id: newId,
                title: '新对话',
                messages: [],
            };
            conversations.unshift(newConv); // 最新在上方
            saveConversations();
            currentConvId = newId;
            renderHistoryList();
            renderCurrentChat();  // 空聊天区
            // 可选自动聚焦输入框
            messageInput.focus();
        }

        // 初始化/加载历史数据
        function loadConversations() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    conversations = JSON.parse(stored);
                    if (!Array.isArray(conversations)) conversations = [];
                    // 保证每个会话都有 messages 数组
                    conversations = conversations.filter(c => c && typeof c === 'object').map(c => {
                        if (!c.messages) c.messages = [];
                        if (!c.title) c.title = generateTitle(c.messages);
                        return c;
                    });
                } catch (e) { conversations = []; }
            }
            if (conversations.length === 0) {
                // 创建一个示例对话，带欢迎消息
                const welcomeId = generateId();
                conversations = [{
                    id: welcomeId,
                    title: '欢迎对话',
                    messages: [
                        { role: 'assistant', content: '你好！我是AI助手，有什么可以帮你的？' }
                    ]
                }];
                saveConversations();
            }
            currentConvId = conversations[0].id;
            renderHistoryList();
            renderCurrentChat();
        }

        // -------------- 后端交互（沿用原逻辑，改为适配会话存储） --------------
        async function sendQuestionToBackend(userQuestion) {
            const backendUrl = 'http://localhost:8000/chat';
            const requestBody = { question: userQuestion };
            try {
                const response = await fetch(backendUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify(requestBody),
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const responseData = await response.json();
                console.log('[后端响应]', responseData);
                let answerText = '';
                if (responseData && responseData.answer !== undefined && responseData.answer !== null) {
                    answerText = String(responseData.answer);
                } else {
                    answerText = `收到响应，但无answer字段: ${JSON.stringify(responseData)}`;
                }
                if (answerText.trim() !== '') {
                    addMessage(answerText, false, true);  // 保存为助理消息
                } else {
                    addMessage('AI返回了空内容', false, true);
                }
            } catch (error) {
                console.error('[请求失败]', error);
                let errorMsg = `请求失败: ${error.message}`;
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = '无法连接到后端服务，请确保后端已启动在 http://localhost:8000 并支持 CORS';
                }
                addMessage(errorMsg, false, true);
            }
        }

        // 发送消息主逻辑
        async function handleSendMessage() {
            if (isRequesting) {
                console.log('等待AI回复中，请稍后');
                return;
            }
            const rawText = messageInput.value;
            const text = rawText.trim();
            if (text === '') return;
            if (!currentConvId) {
                createNewConversation();
            }

            // 1. 显示用户消息并保存
            addMessage(text, true, true);
            messageInput.value = '';

            // 2. 设置加载状态
            isRequesting = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';

            try {
                await sendQuestionToBackend(text);
            } finally {
                isRequesting = false;
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                messageInput.focus();
            }
        }

        // ---------- 事件绑定 ----------
        sendBtn.addEventListener('click', handleSendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isRequesting) {
                e.preventDefault();
                handleSendMessage();
            }
        });
        newChatBtn.addEventListener('click', () => {
            createNewConversation();
        });

        // 启动时加载历史
        loadConversations();
        console.log('已加载历史会话，左侧边栏可见。支持新建、删除、切换对话。');
    </script>
</body>

</html>
