<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能聊天助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: #f9f9f9;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .new-chat-btn {
            width: 100%;
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 10px 0;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .new-chat-btn:hover { background-color: #06ad56; }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover { background-color: #eaeaea; }
        .history-item.active { background-color: #e0f2e5; font-weight: 500; }

        .history-title {
            font-size: 14px;
            color: #222;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex: 1;
        }

        .delete-history {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #999;
            opacity: 0;
            padding: 0 4px;
        }

        .history-item:hover .delete-history { opacity: 1; }
        .delete-history:hover { color: #ff4d4f; }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ededed;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar,
        .history-list::-webkit-scrollbar { width: 5px; }

        .chat-container::-webkit-scrollbar-track,
        .history-list::-webkit-scrollbar-track { background: #d9d9d9; border-radius: 3px; }

        .chat-container::-webkit-scrollbar-thumb,
        .history-list::-webkit-scrollbar-thumb { background: #b3b3b3; border-radius: 3px; }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeInUp 0.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-left { justify-content: flex-start; }
        .message-right { justify-content: flex-end; }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            word-wrap: break-word;
            font-size: 15px;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
        }

        .message-left .message-bubble {
            background-color: #ffffff;
            color: #111;
            border-top-left-radius: 4px;
        }

        .message-right .message-bubble {
            background-color: #95ec69;
            color: #111;
            border-top-right-radius: 4px;
        }

        .input-area {
            display: flex;
            padding: 10px 12px;
            background-color: #fafafa;
            border-top: 0.5px solid #e0e0e0;
            align-items: center;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 22px;
            outline: none;
            font-size: 16px;
            background-color: #ffffff;
            box-shadow: 0 0 0 0.5px #e0e0e0;
        }

        #message-input:focus { box-shadow: 0 0 0 1px #07c160; }

        #send-btn {
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        #send-btn:disabled {
            background-color: #a5d6b0;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .sidebar { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="chat-main">
        <div class="chat-container" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="输入消息，AI会回答你..." autocomplete="off">
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const historyListDiv = document.getElementById('historyList');
        const newChatBtn = document.getElementById('newChatBtn');

        const STORAGE_KEY = 'chat_conversations';
        let conversations = [];
        let currentConvId = null;
        let isRequesting = false;

        function saveConversations() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
        }

        function generateTitle(messages) {
            var first = null;
            for (var i = 0; i < messages.length; i++) {
                if (messages[i].role === 'user') { first = messages[i]; break; }
            }
            if (first && first.content) {
                var text = first.content.slice(0, 20);
                return text + (first.content.length > 20 ? '...' : '');
            }
            return '新对话';
        }

        function renderChat() {
            var conv = null;
            for (var i = 0; i < conversations.length; i++) {
                if (conversations[i].id === currentConvId) { conv = conversations[i]; break; }
            }
            chatBox.innerHTML = '';
            if (!conv) return;
            conv.messages.forEach(function(msg) {
                addBubble(msg.content, msg.role === 'user');
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addBubble(content, isUser) {
            if (!content || !content.trim()) return;
            var div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'message-right' : 'message-left');
            var bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content.trim();
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function saveMessage(content, isUser) {
            var conv = null;
            for (var i = 0; i < conversations.length; i++) {
                if (conversations[i].id === currentConvId) { conv = conversations[i]; break; }
            }
            if (!conv) return;
            conv.messages.push({ role: isUser ? 'user' : 'assistant', content: content.trim() });
            if (isUser && conv.messages.length === 1) {
                conv.title = generateTitle(conv.messages);
            }
            saveConversations();
            renderHistory();
        }

        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (conversations.length === 0) {
                historyListDiv.innerHTML = '<div style="padding:16px;color:#999;text-align:center">暂无对话</div>';
                return;
            }
            conversations.forEach(function(conv) {
                var item = document.createElement('div');
                item.className = 'history-item' + (currentConvId === conv.id ? ' active' : '');
                var title = document.createElement('span');
                title.className = 'history-title';
                title.textContent = conv.title || '对话';
                var del = document.createElement('button');
                del.className = 'delete-history';
                del.textContent = 'x';
                del.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteConv(conv.id);
                });
                item.appendChild(title);
                item.appendChild(del);
                item.addEventListener('click', function() {
                    currentConvId = conv.id;
                    renderChat();
                    renderHistory();
                });
                historyListDiv.appendChild(item);
            });
        }

        function deleteConv(id) {
            var newList = [];
            for (var i = 0; i < conversations.length; i++) {
                if (conversations[i].id !== id) newList.push(conversations[i]);
            }
            conversations = newList;
            saveConversations();
            if (currentConvId === id) {
                currentConvId = conversations.length > 0 ? conversations[0].id : null;
            }
            renderHistory();
            renderChat();
        }

        function newConversation() {
            var conv = { id: Date.now().toString(), title: '新对话', messages: [] };
            conversations.unshift(conv);
            saveConversations();
            currentConvId = conv.id;
            renderHistory();
            renderChat();
            messageInput.focus();
        }

        async function sendToBackend(question) {
            try {
                var resp = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question }),
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var answer = data.answer || '(收到空回复)';
                addBubble(answer, false);
                saveMessage(answer, false);
            } catch (err) {
                console.error('请求失败:', err);
                var msg = '服务器连接失败，请确保后端已启动（http://localhost:8000）';
                if (err.message && err.message.indexOf('Failed to fetch') !== -1) {
                    msg = '无法连接到后端服务，请先启动后端再试';
                }
                addBubble(msg, false);
                saveMessage(msg, false);
            }
        }

        async function handleSend() {
            if (isRequesting) return;
            var text = messageInput.value.trim();
            if (!text) return;

            if (!currentConvId) newConversation();

            addBubble(text, true);
            saveMessage(text, true);
            messageInput.value = '';

            isRequesting = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';

            await sendToBackend(text);

            isRequesting = false;
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
            messageInput.focus();
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
        newChatBtn.addEventListener('click', newConversation);

        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try { conversations = JSON.parse(stored); } catch (e) { conversations = []; }
            if (!Array.isArray(conversations)) conversations = [];
        }
        if (conversations.length === 0) {
            conversations = [{
                id: '1',
                title: '欢迎',
                messages: [{ role: 'assistant', content: '你好！我是AI助手，有什么可以帮你的？' }]
            }];
            saveConversations();
        }
        currentConvId = conversations[0].id;
        renderHistory();
        renderChat();
    </script>
</body>
</html>
