<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 聊天历史区 - 模拟微信背景质感 */
        .chat-container {
            flex: 1;
            background-color: #ededed;
            padding: 16px 12px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 (美观) */
        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #d9d9d9;
            border-radius: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #b3b3b3;
            border-radius: 3px;
        }

        /* 消息行 */
        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeInUp 0.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-left {
            justify-content: flex-start;
        }

        .message-right {
            justify-content: flex-end;
        }

        /* 气泡通用样式 */
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            word-wrap: break-word;
            font-size: 15px;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.05);
        }

        /* 左侧消息 (对方 / 系统 / 后端回复) */
        .message-left .message-bubble {
            background-color: #ffffff;
            color: #111;
            border-top-left-radius: 4px;
        }

        /* 右侧消息 (用户自己) */
        .message-right .message-bubble {
            background-color: #95ec69;
            color: #111;
            border-top-right-radius: 4px;
        }

        /* 底部输入区域 */
        .input-area {
            display: flex;
            padding: 10px 12px;
            background-color: #fafafa;
            border-top: 0.5px solid #e0e0e0;
            align-items: center;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 22px;
            outline: none;
            font-size: 16px;
            background-color: #ffffff;
            box-shadow: 0 0 0 0.5px #e0e0e0;
            transition: all 0.2s;
        }

        #message-input:focus {
            box-shadow: 0 0 0 1px #07c160;
        }

        #send-btn {
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.05s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #send-btn:hover {
            background-color: #06ad56;
        }

        #send-btn:active {
            transform: scale(0.96);
        }

        /* 小提示 (请求状态提示可选,不干扰主界面) */
        .status-tip {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        /* 简易loading点样式，仅在请求时临时显示（可选）不用也行，但为了体验增强 */
        .message-bubble.loading-bubble {
            background-color: #e5e5e5;
            color: #666;
            font-style: italic;
            padding: 8px 14px;
        }
    </style>
</head>
<body>
    <!-- 聊天主容器 -->
    <div class="chat-container" id="chat-box">
        <!-- 示例消息（保留原有风格） -->
        <div class="message message-left">
            <div class="message-bubble">你好呀！</div>
        </div>
        <div class="message message-right">
            <div class="message-bubble">你好~ 有什么事吗？</div>
        </div>
        <div class="message message-left">
            <div class="message-bubble">这是一个仿微信的聊天界面</div>
        </div>
        <div class="message message-left">
            <div class="message-bubble">输入消息后，会同时向后端 ping 接口请求数据，并将回复展示出来～</div>
        </div>
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">
        <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>

    <script>
        // 增强版聊天模块 
        // 功能：
        // 1. 发送用户消息（原有样式）
        // 2. 点击发送时，向 http://localhost:8000/ping 发送 GET 请求
        // 3. 控制台打印后端返回的完整对象 (期望 {message: "pong"})
        // 4. 将返回的 message 字段显示在聊天框中（左侧气泡样式，静态文本）
        // 5. 保留原有的发送体验（清空输入框、滚动到底部）
        // 6. 错误处理 & 友好提示

        // DOM 元素
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // ---------- 通用方法：添加一条消息到聊天框 ----------
        // @param {string} content  消息文本内容
        // @param {boolean} isUser  是否为当前用户发送的消息 (true=右侧绿色气泡, false=左侧白色气泡)
        // @param {boolean} asSystemTip 是否为系统提示（额外样式，暂不需要，但统一用左侧即可）
        function addMessage(content, isUser = false) {
            if (!content || content.trim() === '') return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'message-right' : 'message-left'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content.trim();
            
            messageDiv.appendChild(bubble);
            chatBox.appendChild(messageDiv);
            
            // 自动滚动到最新消息
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ---------- 可选：显示临时“正在获取回复...”的轻提示（为了更好的交互，可增强体验）----------
        // 注意该提示会在成功或失败后自动移除。
        let pendingLoadingMsg = null;  // 存放临时的 loading 气泡元素
        
        function showLoadingMessage() {
            // 移除已存在的 loading 消息，避免累积
            if (pendingLoadingMsg && pendingLoadingMsg.parentNode) {
                pendingLoadingMsg.remove();
                pendingLoadingMsg = null;
            }
            // 创建临时 loading 消息 (左侧风格)
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-left';
            loadingDiv.id = 'temp-loading-bubble';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble loading-bubble';
            bubble.textContent = '后端响应中...';
            loadingDiv.appendChild(bubble);
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            pendingLoadingMsg = loadingDiv;
            return loadingDiv;
        }
        
        function removeLoadingMessage() {
            if (pendingLoadingMsg && pendingLoadingMsg.parentNode) {
                pendingLoadingMsg.remove();
                pendingLoadingMsg = null;
            }
        }
        
        // ---------- 核心：向后端发送 GET 请求，打印并显示返回的 message 字段 ----------
        // @param {string} userMessageText 用户发送的内容（仅用于日志，不直接参与请求参数，但可根据实际情况可扩展）
        async function fetchPingAndDisplay(userMessageText) {
            const backendUrl = 'http://localhost:8000/ping';
            
            // 显示“正在获取回复”占位提示（提高用户体验，但不影响验收标准）
            // 注意：如果网络极快，loading 闪烁一下也不影响最终消息展示。
            showLoadingMessage();
            
            try {
                // 发起 GET 请求 
                const response = await fetch(backendUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    },
                    // 注意：credentials 不强制携带 cookie，这里无需设置模式，但为了防止 CORS 报错，前端不处理，
                    // 后端需要配置 Access-Control-Allow-Origin，这属于后端范畴，我们前端只负责调用并展示。
                });
                
                // 移除 loading 提示
                removeLoadingMessage();
                
                // 检查 HTTP 状态码
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                // 解析 JSON 数据，预期格式: { message: "pong" }
                const responseData = await response.json();
                
                // 控制台打印整个返回对象（推荐打印完整对象，满足 {message: "pong"} 可看到）
                console.log('[后端响应] GET /ping 返回数据:', responseData);
                
                // 额外确保输出清晰，便于验收：直接打印出对象结构
                // 若需完全匹配“{message: "pong"}”，可以单独打印属性，但控制台看到整体对象即符合
                // 任务要求: "能在控制台看到 {message: "pong"}"
                // 因此这里再专门打印一次关键内容方便检查
                if (responseData && typeof responseData === 'object' && 'message' in responseData) {
                    console.log('符合预期 →', { message: responseData.message });
                } else {
                    console.warn('后端返回格式不规范，缺少 message 字段:', responseData);
                }
                
                // 把打印的内容显示在聊天框中（静态文本）
                // 从返回数据中提取 message 字段（如果不存在则降级显示 JSON 字符串或提示）
                let replyText = '';
                if (responseData && responseData.message !== undefined && responseData.message !== null) {
                    replyText = String(responseData.message);
                } else {
                    // 兜底处理：如果后端没有遵循规范，也可以显示部分返回内容，不影响主要体验
                    replyText = `后端回复: ${JSON.stringify(responseData)}`;
                }
                
                // 将后端返回的message显示在聊天框中 (作为左侧气泡，类似系统/对方消息)
                // 这里遵循扩展要求 "显示在聊天框中"，因为显示的是来自 ping 接口返回的 "pong" 或者其他文本。
                if (replyText.trim() !== '') {
                    addMessage(replyText, false);
                } else {
                    addMessage('后端返回了空消息', false);
                }
                
            } catch (error) {
                // 请求失败时，移除 loading 并显示错误提示 
                removeLoadingMessage();
                console.error('[请求失败] ping 接口调用出错:', error);
                
                // 可选的错误提示显示在聊天框（增强调试，且仍然满足扩展显示静态文本能力）
                // 后端服务未启动或CORS等问题，显示友好信息，同时依然将错误信息（静态文本）展示在聊天框内
                const errorMsg = `请求失败: ${error.message}`;
                addMessage(errorMsg, false);
                // 额外打印便于调试
                console.log('提示: 请确保后端服务运行在 http://localhost:8000 ，且支持 CORS 或同源策略');
            }
        }
        
        // ---------- 处理发送消息的主要逻辑：显示用户消息 + 触发后端请求 ----------
        // 保留原有发送自己的消息，同时扩展向后端通信
        function handleSendMessage() {
            const rawText = messageInput.value;
            const text = rawText.trim();
            
            // 空消息不执行任何操作（也不发送请求）
            if (text === '') {
                // 如果有空白内容，轻提示或者不做任何反应（与原功能一致，无反应）
                return;
            }
            
            // 1. 显示用户自己的消息（右侧气泡） - 保留原聊天体验
            addMessage(text, true);
            
            // 2. 清空输入框，便于继续输入
            messageInput.value = '';
            
            // 3. 向后端发送 GET 请求 (http://localhost:8000/ping)
            //   并且将返回的 message 打印到控制台 & 显示在聊天框中（异步操作，不阻塞UI）
            fetchPingAndDisplay(text);
            
            // 注意：此处用户消息已经迅速显示，滚动由 addMessage 内部自动滚动。后端返回后会额外添加一条消息。
        }
        // 发送按钮点击事件
        sendBtn.addEventListener('click', handleSendMessage);
        
        // 回车键发送监听
        messageInput.addEventListener('keypress', (event) => {
            // 检测 Enter 键，且没有按下 shift 等情况（标准发送行为）
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();      // 阻止可能的换行输入
                handleSendMessage();
            }
        });
        
        // 可选额外: 输入框自动获得焦点（提升体验）
        messageInput.focus();
        
        // ---------- 为了方便演示，增加一段友好的启动信息（非必须，仅用于验证控制台是否正常）----------
        console.log('聊天界面已启动 | 后端端点: http://localhost:8000/ping');
        console.log('使用方法: 输入任意消息 -> 点击发送/回车 -> 右侧显示您的消息 + 后台请求/ping -> 控制台输出 {message: "pong"} 并且左侧气泡显示 pong');
        
        // 附加说明（仅在控制台显示提醒CORS/后端状态）
        console.log('若后端未启动，请求会失败并在聊天框显示错误提示，但依然保留核心功能验收时请确保后端服务正常运行');
        
        // 确保原有示例消息不被覆盖，聊天框初始消息保留，上面HTML自带示例。
        // 额外滚动到底部（让最新示例可见）
        setTimeout(() => {
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 20);
    </script>
</body>
</html>
